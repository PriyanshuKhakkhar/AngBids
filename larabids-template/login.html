<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LaraBids</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body class="d-flex align-items-center justify-content-center"
    style="min-height: 100vh; background: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1400') center/cover;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel p-5 text-center shadow-lg">
                    <a href="index.html"><img src="assets/images/logo/logo.png" alt="Logo" height="60" class="mb-4"></a>
                    <h2 class="display-font h3 mb-4">Login to LaraBids</h2>

                    <form>
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2">Email Address</label>
                            <input type="email" class="form-control form-control-elite" placeholder="name@example.com">
                        </div>
                        <div class="mb-4 text-start">
                            <div class="d-flex justify-content-between">
                                <label class="small text-secondary mb-2">Password</label>
                                <a href="#" class="small text-gold text-decoration-none">Forgotten?</a>
                            </div>
                            <input type="password" class="form-control form-control-elite" placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4">SIGN IN</button>

                        <p class="small text-secondary mb-0">Don't have an account? <a href="register.html"
                                class="text-gold text-decoration-none fw-bold">Register Now</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
