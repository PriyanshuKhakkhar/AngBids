<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LaraBids</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body class="d-flex align-items-center justify-content-center py-5"
    style="min-height: 100vh; background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-panel p-5 text-center">
                    <a href="index.html"><img src="assets/images/logo/logo.png" alt="Logo" height="60" class="mb-4"></a>
                    <h2 class="display-font h3 mb-4">Create an Account</h2>

                    <form>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6 text-start">
                                <label class="small text-secondary mb-2">First Name</label>
                                <input type="text" class="form-control form-control-elite" placeholder="John">
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="small text-secondary mb-2">Last Name</label>
                                <input type="text" class="form-control form-control-elite" placeholder="Phelps">
                            </div>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2">Email Address</label>
                            <input type="email" class="form-control form-control-elite" placeholder="name@domain.com">
                        </div>
                        <div class="mb-4 text-start">
                            <label class="small text-secondary mb-2">Password</label>
                            <input type="password" class="form-control form-control-elite"
                                placeholder="Enter a strong password">
                        </div>

                        <div class="form-check text-start mb-4">
                            <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="terms">
                            <label class="form-check-label small text-secondary" for="terms">
                                I agree to the <a href="#" class="text-gold">Terms and Conditions</a> of LaraBids.
                            </label>
                        </div>

                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4">CREATE ACCOUNT</button>

                        <p class="small text-secondary mb-0">Already have an account? <a href="login.html"
                                class="text-gold text-decoration-none fw-bold">Login</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
