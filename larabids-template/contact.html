<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | LaraBids</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <!-- Header Holder -->
    <div id="header-holder"></div>

    <!-- Breadcrumb -->
    <section class="breadcrumb-elite">
        <div class="container text-center">
            <h1 class="display-4 fw-bold mb-2">Contact Us</h1>
            <p class="text-secondary mb-0">Our team is here to help with any inquiries.</p>
        </div>
    </section>

    <!-- Content -->
    <section class="py-5">
        <div class="container py-lg-5">
            <div class="row g-5">
                <div class="col-lg-4" data-aos="fade-up">
                    <div class="glass-panel p-4 mb-4">
                        <h5 class="text-white mb-3">Our Offices</h5>
                        <p class="small text-secondary mb-2"><i class="fas fa-location-arrow text-gold me-2"></i> 1201
                            Broadway, New York, NY</p>
                        <p class="small text-secondary mb-2"><i class="fas fa-phone-alt text-gold me-2"></i> (+1)
                            800-LARA-BIDS</p>
                        <p class="small text-secondary mb-0"><i class="fas fa-envelope text-gold me-2"></i>
                            support@larabids.com</p>
                    </div>
                    <div class="glass-panel p-4">
                        <h5 class="text-white mb-3">Support Hours</h5>
                        <p class="small text-secondary mb-1">Mon - Fri: 24 Hours</p>
                        <p class="small text-secondary mb-0">Sat - Sun: Priority Support Only</p>
                    </div>
                </div>
                <div class="col-lg-8" data-aos="fade-up" data-aos-delay="100">
                    <div class="glass-panel p-5">
                        <h2 class="display-font h3 mb-4">Send a <span class="gold-text">Message</span></h2>
                        <form>
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <input type="text" class="form-control form-control-elite" placeholder="Full Name">
                                </div>
                                <div class="col-md-6">
                                    <input type="email" class="form-control form-control-elite"
                                        placeholder="Email Address">
                                </div>
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control form-control-elite" placeholder="Subject">
                            </div>
                            <div class="mb-4">
                                <textarea class="form-control form-control-elite" rows="5"
                                    placeholder="Your Message..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-gold px-5 py-3 fw-bold">SEND MESSAGE</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Holder -->
    <div id="footer-holder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
