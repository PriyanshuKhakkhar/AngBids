<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist | LaraBids</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div class="d-flex">
        <!-- Sidebar -->
        <aside class="sidebar-elite p-4" style="width: 280px;">
            <div class="text-center mb-5">
                <a href="index.html"><img src="assets/images/logo/logo.png" alt="Logo" height="50"></a>
            </div>

            <nav>
                <a href="dashboard.html" class="sidebar-link rounded mb-2">
                    <i class="fas fa-th-large me-3"></i> Overview
                </a>
                <a href="my-bids.html" class="sidebar-link rounded mb-2">
                    <i class="fas fa-gavel me-3"></i> My Active Bids
                </a>
                <a href="winning-items.html" class="sidebar-link rounded mb-2">
                    <i class="fas fa-trophy me-3"></i> Won Items
                </a>
                <a href="wishlist.html" class="sidebar-link active rounded mb-2">
                    <i class="fas fa-heart me-3"></i> Watchlist
                </a>
                <a href="profile.html" class="sidebar-link rounded mb-2">
                    <i class="fas fa-user-edit me-3"></i> Profile Settings
                </a>
                <div class="mt-5 pt-5">
                    <a href="index.html" class="sidebar-link rounded text-danger opacity-75">
                        <i class="fas fa-sign-out-alt me-3"></i> Secure Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay"></div>

        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Main Content -->
        <main class="flex-grow-1"
            style="background: radial-gradient(at top left, #0e0e0e 0%, #000000 100%); min-height: 100vh;">

            <!-- Dynamic Header for Consistency -->
            <div id="header-holder"></div>

            <div class="p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <span class="badge-elite mb-1 d-block opacity-75">My Favorites</span>
                        <h1 class="h3 text-white fw-bold mb-0">Watchlist</h1>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Wishlist Item 1 -->
                    <div class="col-md-6 col-xl-4">
                        <div class="card card-elite h-100">
                            <div class="position-relative overflow-hidden"
                                style="height: 200px; border-radius: 12px 12px 0 0;">
                                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800"
                                    class="card-img-top h-100 object-fit-cover" alt="Item">
                                <button
                                    class="btn btn-dark btn-sm position-absolute top-0 end-0 m-3 border-0 bg-dark bg-opacity-50 text-gold shadow">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                            <div class="card-body p-4">
                                <h3 class="h6 text-white mb-2">Grand Complication Chronograph</h3>
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <span class="small text-secondary">Starting Bid</span>
                                    <span class="h6 mb-0 text-gold fw-bold">$45,200</span>
                                </div>
                                <a href="auction-details.html" class="btn btn-gold w-100 btn-sm">Join Bidding</a>
                            </div>
                        </div>
                    </div>

                    <!-- Item 2 -->
                    <div class="col-md-6 col-xl-4">
                        <div class="card card-elite h-100">
                            <div class="position-relative overflow-hidden"
                                style="height: 200px; border-radius: 12px 12px 0 0;">
                                <img src="https://images.unsplash.com/photo-1542281286-9e0a16bb7366?auto=format&fit=crop&w=800"
                                    class="card-img-top h-100 object-fit-cover" alt="Item">
                                <button
                                    class="btn btn-dark btn-sm position-absolute top-0 end-0 m-3 border-0 bg-dark bg-opacity-50 text-gold shadow">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                            <div class="card-body p-4">
                                <h3 class="h6 text-white mb-2">Midnight Sapphire GT</h3>
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <span class="small text-secondary">Starting Bid</span>
                                    <span class="h6 mb-0 text-gold fw-bold">$210,000</span>
                                </div>
                                <a href="auction-details.html" class="btn btn-gold w-100 btn-sm">Join Bidding</a>
                            </div>
                        </div>
                    </div>

                    <!-- Empty State Placeholder (Manual visual) -->
                    <div class="col-md-6 col-xl-4">
                        <div
                            class="glass-panel d-flex flex-column align-items-center justify-content-center h-100 p-5 text-center border-dashed opacity-50">
                            <i class="fas fa-plus-circle fs-1 text-gold mb-3"></i>
                            <p class="small text-secondary mb-0">Add items from <br>the auctions gallery</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
