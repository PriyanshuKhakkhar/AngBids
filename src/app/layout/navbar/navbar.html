<nav class="navbar navbar-expand-lg navbar-elite sticky-top py-3">
    <div class="container">
        <a class="navbar-brand" routerLink="/">
            <img src="assets/images/logo/angbids-logo.png" alt="AngBids" height="50">
        </a>
        <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item px-3"><a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
                <li class="nav-item px-3"><a class="nav-link" routerLink="/auctions" routerLinkActive="active">Auctions</a></li>
                <li class="nav-item px-3"><a class="nav-link" routerLink="/about" routerLinkActive="active">About</a></li>
                <li class="nav-item px-3"><a class="nav-link" routerLink="/contact" routerLinkActive="active">Contact</a></li>
            </ul>
            <div class="d-flex gap-3 align-items-center">
                <!-- Search Bar -->
                <div class="nav-search d-none d-lg-flex align-items-center me-3 px-3">
                    <i class="fas fa-search me-2"></i>
                    <input type="text" class="form-control border-0 shadow-none bg-transparent"
                        placeholder="Search auctions...">
                </div>

                <!-- Guest State -->
                <div class="d-none d-sm-flex gap-2 guest-only" *ngIf="!authService.currentUser()">
                    <a routerLink="/login" class="btn btn-outline-gold px-4 btn-sm">Sign In</a>
                    <a routerLink="/register" class="btn btn-gold px-4 btn-sm text-dark fw-bold">Join Now</a>
                </div>

                <!-- Member State (shown when logged in) -->
                <div class="dropdown member-only" *ngIf="authService.currentUser()">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-white"
                        data-bs-toggle="dropdown">
                        <img src="https://ui-avatars.com/api/?name={{authService.currentUser()?.firstName}}+{{authService.currentUser()?.lastName}}&background=d4af37&color=0a192f"
                            class="rounded-circle border border-gold border-opacity-25 me-2" height="35" alt="Avatar">
                        <span class="small d-none d-md-inline">{{authService.currentUser()?.firstName}}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end glass-panel border-gold border-opacity-25">
                        <li><a class="dropdown-item text-white small" routerLink="/dashboard"><i class="fas fa-th-large me-2 text-gold"></i> Dashboard</a></li>
                        <li><a class="dropdown-item text-white small" routerLink="/dashboard/profile"><i class="fas fa-user-edit me-2 text-gold"></i> Profile</a></li>
                        <li><a class="dropdown-item text-white small" routerLink="/dashboard/watchlist"><i class="fas fa-heart me-2 text-gold"></i> Watchlist</a></li>
                        <li><hr class="dropdown-divider border-white border-opacity-10"></li>
                        <li><a class="dropdown-item text-danger small" (click)="authService.logout()" routerLink="/"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>
