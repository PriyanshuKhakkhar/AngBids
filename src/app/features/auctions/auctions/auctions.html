<!-- Breadcrumb -->
<section class="breadcrumb-elite">
    <div class="container text-center">
        <h1 class="display-4 fw-bold mb-2">Browse Auctions</h1>
        <p class="text-secondary mb-0">Discover exceptional items from our curated collection.</p>
    </div>
</section>

<!-- Auctions Filter & Grid -->
<section class="py-5">
    <div class="container py-lg-5">
        <div class="row g-4 mb-5">
            <div class="col-lg-3">
                <button class="btn btn-outline-gold w-100 mb-4 d-lg-none" type="button" data-bs-toggle="collapse"
                    data-bs-target="#filterCollapse">
                    <i class="fas fa-filter me-2"></i> Refine Selection
                </button>
                <div class="glass-panel p-4 h-100 collapse d-lg-block" id="filterCollapse">
                    <h5
                        class="text-white mb-4 display-font border-bottom border-white border-opacity-10 pb-2 d-none d-lg-block">
                        Filter Auctions</h5>

                    <div class="mb-4">
                        <label class="badge-elite mb-2">Categories</label>
                        <div class="form-check mb-2">
                            <input class="form-check-input bg-transparent border-secondary" type="checkbox"
                                id="cat1" checked>
                            <label class="form-check-label small text-secondary" for="cat1">Electronics</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input bg-transparent border-secondary" type="checkbox"
                                id="cat2">
                            <label class="form-check-label small text-secondary" for="cat2">Luxury Watches</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input bg-transparent border-secondary" type="checkbox"
                                id="cat3">
                            <label class="form-check-label small text-secondary" for="cat3">Vintage Cars</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input bg-transparent border-secondary" type="checkbox"
                                id="cat4">
                            <label class="form-check-label small text-secondary" for="cat4">Jewelry</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="badge-elite mb-2">Price Range</label>
                        <input type="range" class="form-range custom-range" id="priceRange">
                        <div class="d-flex justify-content-between small text-secondary">
                            <span>$1k</span>
                            <span>$1M+</span>
                        </div>
                    </div>

                    <button class="btn btn-gold w-100 mt-2">Apply Filters</button>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <p class="text-secondary mb-0">Showing <span class="text-white fw-bold">12</span> Active
                        Auctions</p>
                    <select class="form-select-elite bg-transparent border-secondary text-secondary small p-2"
                        style="border-radius: 4px;">
                        <option>Newest First</option>
                        <option>Closing Soon</option>
                        <option>Price: High - Low</option>
                    </select>
                </div>

                <div class="row g-4">
                    <div class="col-md-6" *ngFor="let auction of auctions">
                        <app-auction-card [auction]="auction"></app-auction-card>
                    </div>
                </div>

                <!-- Pagination -->
                <nav class="mt-5">
                    <ul class="pagination justify-content-center gap-2">
                        <li class="page-item disabled">
                            <a class="page-link glass-panel border-0 text-secondary px-3" href="javascript:void(0)"><i
                                    class="fas fa-chevron-left"></i></a>
                        </li>
                        <li class="page-item active">
                            <a class="page-link btn-gold border-0 px-3" href="javascript:void(0)">1</a>
                        </li>
                        <li class="page-item">
                            <a class="page-link glass-panel border-0 text-white px-3" href="javascript:void(0)">2</a>
                        </li>
                        <li class="page-item">
                            <a class="page-link glass-panel border-0 text-white px-3" href="javascript:void(0)"><i
                                    class="fas fa-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>
