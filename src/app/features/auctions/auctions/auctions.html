<!-- Breadcrumb -->
<section class="breadcrumb-elite">
    <div class="container text-center">
        <h1 class="display-4 fw-bold mb-2">Browse Auctions</h1>
        <p class="text-secondary mb-0">Discover exceptional items from our curated collection.</p>
    </div>
</section>

<!-- Auctions Filter & Grid -->
<section class="py-5">
    <div class="container py-lg-5">
        <div class="row g-4 mb-5">
            <!-- Sidebar / Filters -->
            <div class="col-12 col-lg-3">
                <button class="btn btn-gold w-100 mb-4 d-lg-none py-3" type="button" data-bs-toggle="collapse"
                    data-bs-target="#filterCollapse">
                    <i class="fas fa-filter me-2"></i> Show Filters
                </button>
                <div class="glass-panel p-4 collapse d-lg-block mb-4 mb-lg-0" id="filterCollapse">
                    <h5 class="text-white mb-4 display-font border-bottom border-white border-opacity-10 pb-2">
                        Filter By
                    </h5>

                    <div class="mb-4">
                        <label class="badge-elite mb-2">Categories</label>
                        <div *ngFor="let category of categories()" class="form-check mb-2">
                            <input class="form-check-input bg-transparent border-secondary" type="checkbox"
                                [id]="'cat-' + category.id">
                            <label class="form-check-label small text-secondary" [for]="'cat-' + category.id">
                                {{ category.name }}
                            </label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="badge-elite mb-2">Price Range</label>
                        <input type="range" class="form-range custom-range" id="priceRange">
                        <div class="d-flex justify-content-between small text-secondary">
                            <span>$1k</span>
                            <span>$1M+</span>
                        </div>
                    </div>

                    <button class="btn btn-gold w-100 mt-2">Apply Filters</button>
                </div>
            </div>

            <!-- Auctions Content -->
            <div class="col-12 col-lg-9">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                    <p class="text-secondary mb-0">Showing <span class="text-white fw-bold">{{ auctions().length }}</span> Active
                        Auctions</p>
                    <select class="form-select-elite bg-transparent border-secondary text-secondary small p-2"
                        style="border-radius: 4px; max-width: 200px;">
                        <option>Newest First</option>
                        <option>Closing Soon</option>
                        <option>Price: High - Low</option>
                    </select>
                </div>

                <div class="row g-4">
                    <!-- Loading State -->
                    <div *ngIf="isLoading()" class="col-12 text-center py-5">
                        <div class="spinner-border text-gold" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-secondary mt-3">Fetching the latest auctions...</p>
                    </div>

                    <!-- Error State -->
                    <div *ngIf="errorMessage()" class="col-12 text-center py-5">
                        <div class="alert alert-danger bg-transparent border-danger text-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i> {{ errorMessage() }}
                        </div>
                        <button class="btn btn-outline-gold mt-3" (click)="fetchData()">Try Again</button>
                    </div>

                    <!-- Auctions Grid -->
                    <ng-container *ngIf="!isLoading() && !errorMessage()">
                        <div class="col-12 col-md-6 col-xl-4" *ngFor="let auction of auctions()">
                            <app-auction-card [auction]="auction"></app-auction-card>
                        </div>

                        <!-- Empty State -->
                        <div *ngIf="auctions().length === 0" class="col-12 text-center py-5">
                            <p class="text-secondary">No auctions found matching your criteria.</p>
                        </div>
                    </ng-container>
                </div>

                <!-- Pagination -->
                <nav class="mt-5">
                    <ul class="pagination justify-content-center gap-2">
                        <li class="page-item disabled">
                            <a class="page-link glass-panel border-0 text-secondary px-3" href="javascript:void(0)"><i
                                    class="fas fa-chevron-left"></i></a>
                        </li>
                        <li class="page-item active">
                            <a class="page-link btn-gold border-0 px-3" href="javascript:void(0)">1</a>
                        </li>
                        <li class="page-item">
                            <a class="page-link glass-panel border-0 text-white px-3" href="javascript:void(0)">2</a>
                        </li>
                        <li class="page-item">
                            <a class="page-link glass-panel border-0 text-white px-3" href="javascript:void(0)"><i
                                    class="fas fa-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>
