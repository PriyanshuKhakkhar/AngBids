<section class="py-5 mt-4">
  <div class="container py-lg-5">
    <div class="row g-4">
      <!-- Sidebar Navigation -->
      <div class="col-lg-3">
        <div class="dashboard-sidebar bg-white p-4 h-100 rounded-4 shadow-sm border border-light">
          <div class="text-center mb-4 pb-4 border-bottom border-light">
            <div class="avatar-lg mx-auto mb-3 position-relative">
              <img [src]="avatarUrl" class="rounded-circle shadow-sm" width="100%" height="100%" style="object-fit: cover;" alt="User">
              <span class="position-absolute bottom-0 end-0 bg-success border border-3 border-white rounded-circle p-1" style="width: 16px; height: 16px; right: 2px !important; bottom: 2px !important;"></span>
            </div>
            <h5 class="text-dark fw-bold mb-1">{{ user?.firstName }} {{ user?.lastName }}</h5>
            <small class="text-muted">{{ user?.email }}</small>
          </div>

          <nav class="nav flex-column dash-nav h-100">
            <div class="px-3 mb-2 text-uppercase text-primary fw-bold" style="font-size: 0.72rem; letter-spacing: 1px;">Overview</div>
            <a *ngFor="let item of menuItems"
               [routerLink]="item.link"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{exact: item.exact}"
               class="nav-link d-flex align-items-center gap-3 py-2 px-3 rounded-pill mb-2 fw-medium text-secondary transition-all dash-link">
              <div class="icon-box d-flex align-items-center justify-content-center text-primary rounded-circle" style="width: 32px; height: 32px; background: rgba(78, 115, 223, 0.1);">
                <i [class]="item.icon"></i>
              </div>
              <span class="flex-grow-1">{{ item.label }}</span>
              <i class="fas fa-chevron-right ms-auto opacity-25" style="font-size: 0.7rem;"></i>
            </a>

            <div class="mt-auto pt-4">
                <a href="javascript:void(0)" (click)="logout()"
                   class="nav-link text-danger d-flex align-items-center gap-3 py-2 px-3 rounded-pill fw-medium transition-all dash-link hover-danger">
                  <div class="icon-box d-flex align-items-center justify-content-center text-danger rounded-circle" style="width: 32px; height: 32px; background: rgba(231, 74, 59, 0.1);">
                    <i class="fas fa-sign-out-alt"></i>
                  </div>
                  <span>Logout</span>
                </a>
            </div>
          </nav>
        </div>
      </div>

      <!-- Main Dashboard Content Area -->
      <div class="col-lg-9">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</section>
