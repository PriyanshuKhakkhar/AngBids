<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

        <!-- Auth Card -->
        <div class="auth-card">

          <!-- Header -->
          <div class="auth-card-header">
            <a routerLink="/">
              <img src="assets/images/logo/angbids-logo.png" alt="AngBids"
                   class="auth-logo" (error)="$any($event.target).style.display='none'">
            </a>
            <h1 class="auth-title">Login</h1>
            <p class="auth-subtitle">Welcome back! Sign in to your account.</p>
          </div>

          <!-- Error -->
          <div *ngIf="errorMessage()" class="auth-alert auth-alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>{{ errorMessage() }}
          </div>

          <!-- Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form" novalidate>

            <!-- Email -->
            <div class="auth-field">
              <label class="auth-label" for="login-email">Email Address</label>
              <div class="auth-input-wrap">
                <span class="auth-input-icon"><i class="fas fa-envelope"></i></span>
                <input id="login-email" type="email" class="auth-input"
                       formControlName="email" placeholder="name@example.com"
                       autocomplete="email">
              </div>
              <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                   class="auth-error">Please enter a valid email address.</div>
            </div>

            <!-- Password -->
            <div class="auth-field">
              <div class="auth-label-row">
                <label class="auth-label" for="login-password">Password</label>
                <a routerLink="/forgot-password" class="auth-forgot-link">Forgot password?</a>
              </div>
              <div class="auth-input-wrap">
                <span class="auth-input-icon"><i class="fas fa-lock"></i></span>
                <input id="login-password" [type]="showPassword() ? 'text' : 'password'"
                       class="auth-input auth-input-has-eye"
                       formControlName="password" placeholder="••••••••"
                       autocomplete="current-password">
                <button type="button" class="auth-eye-btn" (click)="togglePassword()"
                        [title]="showPassword() ? 'Hide password' : 'Show password'">
                  <i [class]="showPassword() ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                </button>
              </div>
              <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                   class="auth-error">Password must be at least 6 characters.</div>
            </div>

            <!-- Remember Me -->
            <div class="auth-remember-row">
              <label class="auth-check-label">
                <input type="checkbox" class="auth-check-input"> Remember me
              </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="auth-submit-btn"
                    [disabled]="isLoading() || loginForm.invalid">
              <span *ngIf="!isLoading()">
                <i class="fas fa-sign-in-alt me-2"></i>Login
              </span>
              <span *ngIf="isLoading()" class="d-flex align-items-center justify-content-center gap-2">
                <span class="auth-spinner"></span> Signing in...
              </span>
            </button>

            <!-- Divider -->
            <div class="auth-divider">
              <span>OR</span>
            </div>

            <!-- Google -->
            <button type="button" class="auth-google-btn">
              <svg class="auth-google-icon" viewBox="0 0 24 24" width="18" height="18">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Continue with Google
            </button>

          </form>

          <!-- Footer -->
          <div class="auth-card-footer">
            Don't have an account?
            <a routerLink="/register" class="auth-link">Register Here</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
