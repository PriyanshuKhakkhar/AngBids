<!-- Register Section -->
<section class="py-5 mt-4 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="container py-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-panel p-5 text-center shadow-lg register-card">
                    <a routerLink="/"><img src="assets/images/logo/angbids-logo.png" alt="AngBids" height="60" class="mb-4"></a>
                    <h2 class="display-font h3 mb-4">Create an Account</h2>

                    <!-- Success Message -->
                    <div *ngIf="successMessage()" class="alert alert-success bg-transparent border-success text-success small mb-3">
                        <i class="fas fa-check-circle me-2"></i>{{ successMessage() }}
                    </div>

                    <!-- Error Message -->
                    <div *ngIf="errorMessage()" class="alert alert-danger bg-transparent border-danger text-danger small mb-3">
                        <i class="fas fa-exclamation-triangle me-2"></i>{{ errorMessage() }}
                    </div>

                    <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
                        <!-- Name row -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6 text-start">
                                <label class="small text-secondary mb-2 px-1">First Name</label>
                                <input type="text" class="form-control form-control-elite shadow-none"
                                    formControlName="first_name" placeholder="John">
                                <div *ngIf="registerForm.get('first_name')?.invalid && registerForm.get('first_name')?.touched"
                                    class="text-danger small mt-1">First name is required.</div>
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="small text-secondary mb-2 px-1">Last Name</label>
                                <input type="text" class="form-control form-control-elite shadow-none"
                                    formControlName="last_name" placeholder="Phelps">
                                <div *ngIf="registerForm.get('last_name')?.invalid && registerForm.get('last_name')?.touched"
                                    class="text-danger small mt-1">Last name is required.</div>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2 px-1">Email Address</label>
                            <input type="email" class="form-control form-control-elite shadow-none"
                                formControlName="email" placeholder="name@domain.com">
                            <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
                                class="text-danger small mt-1">Please enter a valid email.</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2 px-1">Password</label>
                            <input type="password" class="form-control form-control-elite shadow-none"
                                formControlName="password" placeholder="Create password">
                            <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
                                class="text-danger small mt-1">Password must be at least 8 characters.</div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4 text-start">
                            <label class="small text-secondary mb-2 px-1">Confirm Password</label>
                            <input type="password" class="form-control form-control-elite shadow-none"
                                formControlName="password_confirmation" placeholder="Re-enter password">
                            <div *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('password_confirmation')?.touched"
                                class="text-danger small mt-1">Passwords do not match.</div>
                        </div>

                        <!-- Terms -->
                        <div class="form-check text-start mb-4 px-4">
                            <input class="form-check-input bg-transparent border-secondary shadow-none"
                                type="checkbox" id="terms" formControlName="terms">
                            <label class="form-check-label small text-secondary" for="terms">
                                I agree to the <a href="javascript:void(0)" class="text-gold text-decoration-none">Terms and Conditions</a> of AngBids.
                            </label>
                            <div *ngIf="registerForm.get('terms')?.invalid && registerForm.get('terms')?.touched"
                                class="text-danger small mt-1">You must accept the terms.</div>
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4 shadow-none fw-bold"
                            [disabled]="isLoading()">
                            <span *ngIf="!isLoading()">CREATE ACCOUNT</span>
                            <span *ngIf="isLoading()">
                                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                CREATING...
                            </span>
                        </button>

                        <p class="small text-secondary mb-0 text-center">Already have an account?
                            <a routerLink="/login" class="text-gold text-decoration-none fw-bold ms-1">Login</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
