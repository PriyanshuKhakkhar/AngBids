<!-- Register Section -->
<section class="py-5 mt-4 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="container py-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-panel p-5 text-center shadow-lg register-card">
                    <a routerLink="/"><img src="assets/images/logo/angbids-logo.png" alt="AngBids" height="60" class="mb-4"></a>
                    <h2 class="display-font h3 mb-4">Create an Account</h2>

                    <form>
                        <!-- Name row -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6 text-start">
                                <label class="small text-secondary mb-2 px-1">First Name</label>
                                <input type="text" class="form-control form-control-elite shadow-none" placeholder="John">
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="small text-secondary mb-2 px-1">Last Name</label>
                                <input type="text" class="form-control form-control-elite shadow-none" placeholder="Phelps">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2 px-1">Email Address</label>
                            <input type="email" class="form-control form-control-elite shadow-none" placeholder="name@domain.com">
                        </div>

                        <!-- Password -->
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2 px-1">Password</label>
                            <input type="password" class="form-control form-control-elite shadow-none"
                                placeholder="Create password">
                        </div>

                        <!-- Confirm Password (Added per request) -->
                        <div class="mb-4 text-start">
                            <label class="small text-secondary mb-2 px-1">Confirm Password</label>
                            <input type="password" class="form-control form-control-elite shadow-none"
                                placeholder="Re-enter password">
                        </div>

                        <!-- Terms -->
                        <div class="form-check text-start mb-4 px-4">
                            <input class="form-check-input bg-transparent border-secondary shadow-none" type="checkbox" id="terms">
                            <label class="form-check-label small text-secondary" for="terms">
                                I agree to the <a href="javascript:void(0)" class="text-gold text-decoration-none">Terms and Conditions</a> of AngBids.
                            </label>
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4 shadow-none fw-bold">CREATE ACCOUNT</button>

                        <p class="small text-secondary mb-0 text-center">Already have an account? <a routerLink="/login"
                                class="text-gold text-decoration-none fw-bold ms-1">Login</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
