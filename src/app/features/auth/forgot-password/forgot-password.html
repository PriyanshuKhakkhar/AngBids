<section class="py-5 mt-4 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="container py-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel p-5 text-center shadow-lg">
                    <a routerLink="/"><img src="assets/logo/Cobalt%20Blue%20Auction%20Gavel%20Logo.png" alt="AngBids" height="100" class="mb-4"></a>
                    <h2 class="display-font h3 mb-2">Forgot Password</h2>
                    <p class="small text-secondary mb-4">Enter your email and we'll send you a reset link.</p>

                    <div *ngIf="successMessage()" class="alert alert-success bg-transparent border-success text-success small mb-3">
                        <i class="fas fa-check-circle me-2"></i>{{ successMessage() }}
                    </div>
                    <div *ngIf="errorMessage()" class="alert alert-danger bg-transparent border-danger text-danger small mb-3">
                        <i class="fas fa-exclamation-triangle me-2"></i>{{ errorMessage() }}
                    </div>

                    <form [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="mb-4 text-start">
                            <label class="small text-secondary mb-2">Email Address</label>
                            <input type="email" class="form-control form-control-elite"
                                formControlName="email" placeholder="name@example.com">
                            <div *ngIf="email?.invalid && email?.touched" class="text-danger small mt-1">
                                Please enter a valid email address.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4" [disabled]="isLoading()">
                            <span *ngIf="!isLoading()">SEND RESET LINK</span>
                            <span *ngIf="isLoading()">
                                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                SENDING...
                            </span>
                        </button>

                        <a routerLink="/login" class="small text-secondary text-decoration-none opacity-75">
                            <i class="fas fa-arrow-left me-1"></i> Back to Login
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
