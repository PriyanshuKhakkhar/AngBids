<div class="card card-elite h-100 position-relative shadow-sm border-0 rounded-4 overflow-hidden bg-white hover-shadow-lg transition-all">
    <a [routerLink]="['/auctions', auction.id]" class="stretched-link"></a>
    
    <!-- Image Section -->
    <div class="position-relative overflow-hidden" style="height: 180px;">
        <div class="d-block w-100 h-100">
            <img [src]="auction.imageUrl" class="card-img-top h-100 object-fit-cover shadow-sm transition-all auction-img" [alt]="auction.title" (error)="$any($event.target).src = placeholder">
        </div>
        <div class="position-absolute top-0 start-0 m-2" style="z-index: 2;">
            <span class="badge bg-gold text-dark shadow-sm fw-bold" style="font-size: 0.7rem;">{{ auction.category }}</span>
        </div>
        <div class="position-absolute top-0 end-0 m-2" style="z-index: 2;">
            <button type="button" class="btn btn-white rounded-circle shadow-sm d-flex align-items-center justify-content-center p-0 cursor-pointer" style="width: 32px; height: 32px; border: none; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);">
                <i class="far fa-heart text-danger" style="font-size: 0.8rem;"></i>
            </button>
        </div>
    </div>

    <!-- Content Section -->
    <div class="card-body p-3 d-flex flex-column flex-grow-1">
        <div class="glass-timer text-dark text-center py-1 timer-val mb-2 shadow-none border">
            <app-countdown-timer [endDate]="auction.endDate"></app-countdown-timer>
        </div>

        <h3 class="h6 mb-2 fw-bold text-dark text-truncate title-hover">
            {{ auction.title }}
        </h3>
        
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div class="d-flex align-items-center">
                <ng-container *ngIf="auction.seller?.avatar; else noAvatar">
                    <img [src]="auction.seller!.avatar" class="rounded-circle me-1 border bg-white" width="20" height="20" style="object-fit: cover;" [alt]="auction.seller!.name">
                </ng-container>
                <ng-template #noAvatar>
                    <div class="rounded-circle bg-light d-flex align-items-center justify-content-center me-1 border" style="width: 20px; height: 20px;">
                        <i class="fas fa-user text-secondary" style="font-size: 10px;"></i>
                    </div>
                </ng-template>
                <span class="text-xs text-muted text-truncate" style="max-width: 80px;">{{ auction.seller?.name || 'Seller' }}</span>
            </div>
            <span class="badge bg-light text-secondary border fw-normal text-xs px-2 py-1">
                {{ auction.totalBids }} Bids
            </span>
        </div>
        
        <div class="mt-auto">
            <div class="d-flex justify-content-between align-items-center mb-2 pt-2 border-top border-light">
                <span class="text-xs text-secondary fw-bold text-uppercase">Current Bid</span>
                <span class="h6 mb-0 text-primary fw-bold" style="color: var(--primary-color) !important;">{{ auction.currentBid | currency:'INR':'symbol':'1.2-2' }}</span>
            </div>
            <div class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow-sm transition-all btn-hover-effect" style="font-size: 0.8rem;">
                BID NOW <i class="fas fa-gavel ms-1"></i>
            </div>
        </div>
    </div>
</div>
