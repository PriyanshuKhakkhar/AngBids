<div class="card card-elite h-100">
    <div class="position-relative overflow-hidden" style="height: 280px; border-radius: 12px 12px 0 0; background: #1a1a1a;">
        <img [src]="auction.imageUrl" 
             class="card-img-top h-100 object-fit-cover transition-soft" 
             [alt]="auction.title"
             (error)="$any($event.target).src = 'http://127.0.0.1:8000/assets/images/banner-3.png'">
    </div>
    <div class="card-body p-4">
        <div class="glass-timer text-center mb-3">
            <app-countdown-timer [endDate]="auction.endDate || auction.end_date || ''"></app-countdown-timer>
        </div>
        <h3 class="h5 mb-2">{{ auction.title }}</h3>
        <p class="text-secondary small mb-4 text-truncate">{{ auction.description }}</p>
        <div class="d-flex justify-content-between align-items-center mb-4 pt-3 border-top border-white border-opacity-10">
            <span class="small text-secondary">CURRENT BID</span>
            <span class="h5 mb-0 fw-bold" style="color: var(--elite-gold);">
                {{ (auction.current_price || auction.currentBid) | currency }}
            </span>
        </div>
        <a [routerLink]="['/auctions', auction.id]" class="btn btn-gold w-100 py-2">{{ auction.buttonText || 'View Details' }}</a>
    </div>
</div>
