<div class="timer-container d-flex gap-2">
  <div class="timer-box">
    <span class="timer-value">{{ days }}</span>
    <span class="timer-label">D</span>
  </div>
  <div class="timer-divider">:</div>
  <div class="timer-box">
    <span class="timer-value">{{ hours }}</span>
    <span class="timer-label">H</span>
  </div>
  <div class="timer-divider">:</div>
  <div class="timer-box">
    <span class="timer-value">{{ minutes }}</span>
    <span class="timer-label">M</span>
  </div>
  <div class="timer-divider">:</div>
  <div class="timer-box">
    <span class="timer-value text-danger">{{ seconds }}</span>
    <span class="timer-label text-danger">S</span>
  </div>
</div>
