<!-- Login Section -->
<section class="py-5 mt-4 d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="container py-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-panel p-5 text-center shadow-lg">
                    <a routerLink="/"><img src="assets/images/logo/angbids-logo.png" alt="AngBids" height="60" class="mb-4"></a>
                    <h2 class="display-font h3 mb-4">Login to AngBids</h2>

                    <form>
                        <div class="mb-3 text-start">
                            <label class="small text-secondary mb-2">Email Address</label>
                            <input type="email" class="form-control form-control-elite" placeholder="name@example.com">
                        </div>
                        <div class="mb-4 text-start">
                            <div class="d-flex justify-content-between">
                                <label class="small text-secondary mb-2">Password</label>
                                <a href="javascript:void(0)" class="small text-gold text-decoration-none">Forgotten?</a>
                            </div>
                            <input type="password" class="form-control form-control-elite" placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-gold w-100 py-3 mb-4">SIGN IN</button>

                        <p class="small text-secondary mb-0 text-center">Don't have an account? <a routerLink="/register"
                                class="text-gold text-decoration-none fw-bold">Register Now</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
